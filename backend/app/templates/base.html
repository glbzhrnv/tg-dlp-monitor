<!DOCTYPE html>
<html lang="ru" class="h-full bg-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TG-DLP Monitor{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full">
    <nav class="bg-indigo-700 text-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <a href="/dashboard" class="text-xl font-bold">TG-DLP Monitor</a>
                </div>
                
                <div class="flex items-center space-x-6">
                    <a href="/dashboard" class="hover:bg-indigo-600 px-3 py-2 rounded-md text-sm font-medium">Дашборд</a>
                    <a href="/sources" class="hover:bg-indigo-600 px-3 py-2 rounded-md text-sm font-medium">Источники</a>
                    <a href="/alerts" class="hover:bg-indigo-600 px-3 py-2 rounded-md text-sm font-medium">Алерты</a>
                    <!-- Простая ссылка на logout -->
                    <a href="/logout" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-md text-sm font-medium transition duration-200">
                        Выход
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
